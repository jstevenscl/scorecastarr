name: GitHub Pages — Publish Tour

on:
  push:
    branches:
      - main
    paths:
      - 'web/tour.html'
      - 'docs/screenshots/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build pages directory
        run: |
          mkdir -p _site
          cp web/tour.html _site/index.html
          cp -r docs/screenshots _site/screenshots

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
